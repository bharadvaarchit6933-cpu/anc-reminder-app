<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ANC Tracker">
<meta name="theme-color" content="#0d5c4a">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>ANC & Td Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#0d5c4a;--green2:#0f7a60;--green3:#e6f4f0;
  --red:#c0392b;--red2:#fdecea;
  --amber:#d97706;--amber2:#fef3c7;
  --blue:#1d6fa4;--blue2:#dbeafe;
  --gray0:#f8f9fa;--gray1:#f1f3f4;--gray2:#e8eaed;--gray3:#c4c7c5;
  --gray4:#80868b;--gray5:#5f6368;--gray6:#3c4043;--gray7:#202124;
  --white:#ffffff;
  --radius:14px;--radius-sm:8px;
  --shadow:0 2px 8px rgba(0,0,0,0.12);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.15);
  font-family:'Noto Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--gray1)}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--white);position:relative;overflow:hidden}

/* STATUS BAR SPACER */
.status-bar{height:env(safe-area-inset-top,0px);background:var(--green)}

/* TOP BAR */
.topbar{background:var(--green);color:var(--white);padding:14px 16px 16px;flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.topbar p{font-size:12px;opacity:0.75;margin-top:2px}
.topbar-btn{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px;transition:transform 0.3s cubic-bezier(.4,0,.2,1),opacity 0.3s;opacity:0;pointer-events:none;transform:translateX(30px)}
.page.active{opacity:1;pointer-events:all;transform:translateX(0)}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray2);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;font-family:inherit;transition:color 0.15s}
.nav-icon{font-size:22px;line-height:1;margin-bottom:3px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.3px;color:var(--gray4)}
.nav-item.active .nav-label{color:var(--green)}
.nav-badge{position:relative;display:inline-block}
.badge{position:absolute;top:-4px;right:-8px;background:var(--red);color:white;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}

/* CARDS & SECTIONS */
.section{padding:16px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray4);margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--gray2);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;padding-top:0}
.stat{background:var(--white);border-radius:var(--radius);padding:14px 12px;text-align:center;border:1px solid var(--gray2);box-shadow:var(--shadow)}
.stat-n{font-size:30px;font-weight:700;line-height:1}
.stat-l{font-size:11px;font-weight:600;color:var(--gray5);margin-top:4px}
.stat.red .stat-n{color:var(--red)}
.stat.amber .stat-n{color:var(--amber)}
.stat.green .stat-n{color:var(--green2)}
.stat.blue .stat-n{color:var(--blue)}

/* ALERT BANNER */
.alert{display:flex;align-items:flex-start;gap:10px;padding:14px;border-radius:var(--radius-sm);margin:0 16px 10px;font-size:13px;font-weight:500}
.alert.red{background:var(--red2);color:var(--red)}
.alert.amber{background:var(--amber2);color:var(--amber)}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* BENEFICIARY LIST */
.bene-card{background:var(--white);border:1px solid var(--gray2);border-radius:var(--radius);margin:0 16px 12px;overflow:hidden;box-shadow:var(--shadow)}
.bene-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--green3);color:var(--green);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bene-info{flex:1;min-width:0}
.bene-name{font-size:15px;font-weight:600;color:var(--gray7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bene-sub{font-size:12px;color:var(--gray4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chevron{color:var(--gray3);font-size:14px;flex-shrink:0;transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;margin-top:4px}
.pill-red{background:var(--red2);color:var(--red)}
.pill-amber{background:var(--amber2);color:var(--amber)}
.pill-blue{background:var(--blue2);color:var(--blue)}
.pill-green{background:var(--green3);color:var(--green)}
.pill-gray{background:var(--gray1);color:var(--gray5)}

/* DETAIL PANEL */
.bene-detail{display:none;border-top:1px solid var(--gray2);background:var(--gray0)}
.bene-detail.open{display:block}
.edd-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--green);color:white}
.edd-row .label{font-size:11px;font-weight:600;opacity:0.75;text-transform:uppercase;letter-spacing:0.5px}
.edd-row .value{font-size:16px;font-weight:700}
.edd-row .days{font-size:11px;opacity:0.8;margin-top:2px;text-align:right}
.visit-section{padding:10px 14px}
.visit-heading{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray4);margin-bottom:8px}
.visit-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--radius-sm);background:var(--white);border:1px solid var(--gray2);margin-bottom:6px}
.visit-row.active-window{border-color:var(--green2);background:var(--green3)}
.visit-row.overdue{border-color:var(--red);background:var(--red2)}
.visit-row.done{opacity:0.55}
.visit-left{}
.visit-label{font-size:13px;font-weight:700;color:var(--gray7)}
.visit-date{font-size:11px;color:var(--gray4);margin-top:2px;font-variant-numeric:tabular-nums}
.done-btn{background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;min-width:72px}
.done-btn:active{opacity:0.8;transform:scale(0.97)}
.done-tick{font-size:18px;color:var(--green)}
.detail-actions{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--gray2)}
.btn-del{flex:1;background:var(--red2);color:var(--red);border:none;border-radius:var(--radius-sm);padding:12px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-del:active{opacity:0.8}

/* FORM */
.form-page{padding:16px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--gray6);margin-bottom:6px}
.form-input{width:100%;padding:14px;border:1.5px solid var(--gray2);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;color:var(--gray7);background:var(--white);outline:none;-webkit-appearance:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--green2)}
.form-input::placeholder{color:var(--gray3)}
.preview-box{background:var(--green3);border:1px solid #a7d9cc;border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;display:none}
.preview-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.preview-row:last-child{margin-bottom:0}
.preview-key{font-size:12px;color:var(--green);font-weight:600}
.preview-val{font-size:13px;font-weight:700;color:var(--green)}
.btn-submit{width:100%;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:0.2px}
.btn-submit:active{opacity:0.85}
.btn-submit:disabled{background:var(--gray3);cursor:not-allowed}

/* SEARCH */
.search-wrap{padding:12px 16px 6px;position:sticky;top:0;background:var(--white);z-index:10;border-bottom:1px solid var(--gray2)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--gray1);border-radius:var(--radius-sm);padding:10px 14px}
.search-box input{border:none;background:transparent;font-size:15px;font-family:inherit;color:var(--gray7);width:100%;outline:none}
.search-box input::placeholder{color:var(--gray4)}
.search-icon{color:var(--gray4);font-size:16px;flex-shrink:0}

/* FILTER CHIPS */
.chips{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray2);background:var(--white);font-size:12px;font-weight:600;color:var(--gray5);cursor:pointer;font-family:inherit}
.chip.active{background:var(--green);border-color:var(--green);color:white}

/* NOTIFICATION PERMISSION */
.notif-banner{margin:0 16px 12px;background:var(--blue2);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;gap:12px}
.notif-banner p{font-size:13px;color:var(--blue);flex:1;font-weight:500}
.btn-notif{background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 24px;color:var(--gray4)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:600;color:var(--gray5);margin-bottom:6px}
.empty p{font-size:13px;line-height:1.5}

/* INSTALL PROMPT */
.install-bar{background:var(--green3);border-bottom:1px solid #a7d9cc;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.install-bar p{font-size:12px;color:var(--green);flex:1;font-weight:500}
.btn-install{background:var(--green);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-install-close{background:none;border:none;color:var(--green);font-size:18px;cursor:pointer;padding:0 4px}

/* DUE PAGE */
.due-group-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin:16px 16px 8px;display:flex;align-items:center;gap:6px}
.due-group-title.red{color:var(--red)}
.due-group-title.amber{color:var(--amber)}
.due-group-title.blue{color:var(--blue)}
.due-item{background:var(--white);border:1px solid var(--gray2);border-radius:var(--radius-sm);margin:0 16px 8px;padding:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
.due-item.red{border-color:var(--red);background:var(--red2)}
.due-item.amber{border-color:var(--amber);background:var(--amber2)}
.due-item-left{}
.due-name{font-size:14px;font-weight:700;color:var(--gray7)}
.due-meta{font-size:12px;color:var(--gray5);margin-top:3px}
.due-service{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.due-service.red{background:var(--red);color:white}
.due-service.amber{background:var(--amber);color:white}
.due-service.blue{background:var(--blue);color:white}
</style>
</head>
<body>
<div id="app">
  <div class="status-bar"></div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <h1>🏥 ANC Tracker</h1>
        <p id="topbar-sub">Gujarat TeCHO+ ANC Monitoring</p>
      </div>
      <button class="topbar-btn" onclick="goAddPage()" title="Add beneficiary" aria-label="Add beneficiary">＋</button>
    </div>
  </div>

  <!-- INSTALL BANNER -->
  <div class="install-bar" id="install-bar" style="display:none">
    <p>📲 Install app on home screen for offline use</p>
    <button class="btn-install" id="btn-install-do">Install</button>
    <button class="btn-install-close" onclick="document.getElementById('install-bar').style.display='none'">✕</button>
  </div>

  <!-- PAGES -->
  <div class="pages">

    <!-- HOME / DASHBOARD -->
    <div class="page active" id="page-home">
      <div style="padding:16px 16px 0">
        <div class="section-title">Today's Overview</div>
      </div>
      <div class="stat-grid">
        <div class="stat green"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total</div></div>
        <div class="stat red"><div class="stat-n" id="s-overdue">0</div><div class="stat-l">Overdue</div></div>
        <div class="stat amber"><div class="stat-n" id="s-week">0</div><div class="stat-l">Due This Week</div></div>
        <div class="stat blue"><div class="stat-n" id="s-today">0</div><div class="stat-l">Due Today</div></div>
      </div>
      <div id="home-alerts"></div>
      <div id="notif-banner-wrap"></div>
      <div style="padding:0 16px">
        <div class="section-title">Recent Beneficiaries</div>
      </div>
      <div id="home-recent"></div>
    </div>

    <!-- BENEFICIARY LIST -->
    <div class="page" id="page-list">
      <div class="search-wrap">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search name or village..." oninput="renderList()">
        </div>
      </div>
      <div class="chips">
        <button class="chip active" onclick="setChip('all',this)">All</button>
        <button class="chip" onclick="setChip('overdue',this)">⚠ Overdue</button>
        <button class="chip" onclick="setChip('today',this)">🔴 Today</button>
        <button class="chip" onclick="setChip('week',this)">📅 This Week</button>
      </div>
      <div id="list-container"></div>
    </div>

    <!-- DUE TODAY / ALERTS -->
    <div class="page" id="page-due">
      <div id="due-container"></div>
    </div>

    <!-- ADD FORM -->
    <div class="page" id="page-add">
      <div class="form-page">
        <div class="section-title" style="margin-bottom:16px">Register New Beneficiary</div>
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" id="f-name" type="text" placeholder="e.g. Sonal Patel" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label class="form-label">LMP Date (Last Menstrual Period) *</label>
          <input class="form-input" id="f-lmp" type="date" onchange="previewCalc()">
        </div>
        <div class="form-group">
          <label class="form-label">Mobile Number</label>
          <input class="form-input" id="f-mobile" type="tel" placeholder="e.g. 9876543210" inputmode="numeric">
        </div>
        <div class="form-group">
          <label class="form-label">Village / Area</label>
          <input class="form-input" id="f-village" type="text" placeholder="e.g. Kalyanpur" autocomplete="off">
        </div>
        <div class="preview-box" id="preview-box">
          <div class="preview-row"><span class="preview-key">EDD</span><span class="preview-val" id="pv-edd">—</span></div>
          <div class="preview-row"><span class="preview-key">ANC 1 Window</span><span class="preview-val" id="pv-anc1">—</span></div>
          <div class="preview-row"><span class="preview-key">Td-1 Due</span><span class="preview-val" id="pv-td1">—</span></div>
          <div class="preview-row"><span class="preview-key">Td-2 Due</span><span class="preview-val" id="pv-td2">—</span></div>
        </div>
        <button class="btn-submit" id="btn-submit" onclick="submitForm()">✓ Register Beneficiary</button>
      </div>
    </div>

  </div><!-- /pages -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="goPage('home',this)">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </button>
    <button class="nav-item" onclick="goPage('list',this)">
      <div class="nav-icon">👥</div>
      <div class="nav-label">Beneficiaries</div>
    </button>
    <button class="nav-item" onclick="goPage('due',this)">
      <div class="nav-badge">
        <div class="nav-icon">🔔</div>
        <span class="badge" id="due-badge" style="display:none">0</span>
      </div>
      <div class="nav-label">Alerts</div>
    </button>
    <button class="nav-item" onclick="goAddPage()">
      <div class="nav-icon">➕</div>
      <div class="nav-label">Add</div>
    </button>
  </nav>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────
const STORE_KEY = 'anc_data_v2';
let db = JSON.parse(localStorage.getItem(STORE_KEY) || '{"beneficiaries":[]}');
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(db)); }

// ─── DATE UTILS ─────────────────────────────────────────────────────────
const today = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();

function parseLocal(s) {
  // Parse date string as local date (avoid UTC offset issues)
  const [y,m,d] = s.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setHours(0,0,0,0);
  return dt;
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}

function diffDays(a, b) {
  // days from a to b (positive = b is in future)
  return Math.round((b - a) / 86400000);
}

function fmt(d) {
  if (!d) return '—';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

// ─── SCHEDULE CALC ───────────────────────────────────────────────────────
function calcSchedule(lmpStr) {
  const lmp = parseLocal(lmpStr);
  const edd = addDays(lmp, 280);
  return {
    lmp,
    edd,
    anc: [
      { id:'ANC1', label:'ANC 1', start: lmp,              end: addDays(lmp, 84)  },
      { id:'ANC2', label:'ANC 2', start: addDays(lmp, 85), end: addDays(lmp, 182) },
      { id:'ANC3', label:'ANC 3', start: addDays(lmp, 183),end: addDays(lmp, 238) },
      { id:'ANC4', label:'ANC 4', start: addDays(lmp, 239),end: edd               },
    ],
    td: [
      { id:'TD1', label:'Td-1', due: addDays(lmp, 84) },
      { id:'TD2', label:'Td-2', due: addDays(lmp, 84 + 28) },
    ]
  };
}

// ─── STATUS LOGIC ────────────────────────────────────────────────────────
function ancStatus(v, completed) {
  if (completed[v.id]) return 'done';
  if (today > v.end)   return 'overdue';
  if (today >= v.start && today <= v.end) return 'active';
  const d = diffDays(today, v.start);
  if (d <= 7) return 'soon';
  return 'upcoming';
}

function tdStatus(v, completed) {
  if (completed[v.id]) return 'done';
  const d = diffDays(today, v.due);
  if (d < 0)  return 'overdue';
  if (d === 0) return 'today';
  if (d <= 7) return 'soon';
  return 'upcoming';
}

function nextDue(ben) {
  const s = calcSchedule(ben.lmp);
  const c = ben.completed || {};
  // Check active ANC window first
  for (const v of s.anc) {
    if (!c[v.id] && today >= v.start && today <= v.end) {
      const left = diffDays(today, v.end);
      return { label: v.label, days: left, state: left <= 7 ? 'soon' : 'active' };
    }
  }
  // Overdue ANC
  for (const v of s.anc) {
    if (!c[v.id] && today > v.end) return { label: v.label, days: null, state: 'overdue' };
  }
  // Overdue Td
  for (const v of s.td) {
    if (!c[v.id] && today > v.due) return { label: v.label, days: null, state: 'overdue' };
  }
  // Upcoming (find soonest)
  const upcoming = [];
  for (const v of s.anc) {
    if (!c[v.id] && today < v.start) upcoming.push({ label: v.label, days: diffDays(today, v.start), state: 'upcoming' });
  }
  for (const v of s.td) {
    if (!c[v.id]) {
      const d = diffDays(today, v.due);
      if (d >= 0) upcoming.push({ label: v.label, days: d, state: d <= 7 ? 'soon' : 'upcoming' });
    }
  }
  if (!upcoming.length) return { label: 'All done', days: 0, state: 'done' };
  upcoming.sort((a,b) => a.days - b.days);
  return upcoming[0];
}

function isOverdue(ben) { return nextDue(ben).state === 'overdue'; }
function isDueToday(ben) {
  const nd = nextDue(ben);
  return nd.days === 0 && nd.state !== 'done';
}
function isDueThisWeek(ben) {
  const nd = nextDue(ben);
  return !isOverdue(ben) && nd.days !== null && nd.days <= 7 && nd.state !== 'done';
}

// ─── PILL HTML ────────────────────────────────────────────────────────────
function pillHtml(nd) {
  if (nd.state === 'done')    return `<span class="status-pill pill-gray">✓ All completed</span>`;
  if (nd.state === 'overdue') return `<span class="status-pill pill-red">⚠ ${nd.label} OVERDUE</span>`;
  if (nd.state === 'today' || nd.days === 0) return `<span class="status-pill pill-amber">🔴 ${nd.label} Today</span>`;
  if (nd.state === 'soon')    return `<span class="status-pill pill-amber">📅 ${nd.label} in ${nd.days}d</span>`;
  if (nd.state === 'active')  return `<span class="status-pill pill-green">✓ ${nd.label} – ${nd.days}d left</span>`;
  return `<span class="status-pill pill-blue">${nd.label} in ${nd.days}d</span>`;
}

// ─── VISIT ROW STATUS ─────────────────────────────────────────────────────
function visitStatusText(st) {
  return { overdue:'OVERDUE', active:'Current Window', soon:'Due Soon', upcoming:'Upcoming', done:'Done', today:'Due Today' }[st] || '';
}

// ─── MARK DONE ───────────────────────────────────────────────────────────
function markDone(id, serviceId) {
  const ben = db.beneficiaries.find(b => b.id === id);
  if (!ben) return;
  if (!ben.completed) ben.completed = {};
  ben.completed[serviceId] = new Date().toISOString();
  save();
  renderAll();
  // Re-open the card
  setTimeout(() => {
    const detail = document.getElementById('detail-' + id);
    if (detail) detail.classList.add('open');
    const chev = document.getElementById('chev-' + id);
    if (chev) chev.classList.add('open');
  }, 50);
}

function deleteBen(id) {
  if (!confirm('Remove this beneficiary?')) return;
  db.beneficiaries = db.beneficiaries.filter(b => b.id !== id);
  save();
  renderAll();
}

// ─── BENE CARD HTML ───────────────────────────────────────────────────────
function beneCardHtml(ben) {
  const sched = calcSchedule(ben.lmp);
  const c = ben.completed || {};
  const nd = nextDue(ben);

  const eddDiff = diffDays(today, sched.edd);
  const eddStr = eddDiff > 0 ? `${eddDiff} days to go` : eddDiff === 0 ? 'Due today!' : `${Math.abs(eddDiff)} days ago`;

  const ancRows = sched.anc.map(v => {
    const st = ancStatus(v, c);
    const isActiveW = st === 'active';
    const isOv = st === 'overdue';
    const isDone = st === 'done';
    const rowClass = isActiveW ? 'visit-row active-window' : isOv ? 'visit-row overdue' : isDone ? 'visit-row done' : 'visit-row';
    const dateRange = `${fmt(v.start)} – ${fmt(v.end)}`;
    const btn = isDone
      ? `<span class="done-tick">✓</span>`
      : `<button class="done-btn" onclick="markDone('${ben.id}','${v.id}');event.stopPropagation()">Mark Done</button>`;
    return `<div class="${rowClass}">
      <div class="visit-left">
        <div class="visit-label">${v.label}</div>
        <div class="visit-date">${dateRange}</div>
        <div class="visit-date" style="margin-top:2px;font-weight:600;color:${isOv?'var(--red)':isActiveW?'var(--green)':'var(--gray5)'}">${visitStatusText(st)}</div>
      </div>
      ${btn}
    </div>`;
  }).join('');

  const tdRows = sched.td.map(v => {
    const st = tdStatus(v, c);
    const isOv = st === 'overdue' || st === 'today';
    const isDone = st === 'done';
    const rowClass = isOv ? 'visit-row overdue' : isDone ? 'visit-row done' : 'visit-row';
    const btn = isDone
      ? `<span class="done-tick">✓</span>`
      : `<button class="done-btn" onclick="markDone('${ben.id}','${v.id}');event.stopPropagation()">Mark Done</button>`;
    return `<div class="${rowClass}">
      <div class="visit-left">
        <div class="visit-label">${v.label}</div>
        <div class="visit-date">${fmt(v.due)}</div>
        <div class="visit-date" style="margin-top:2px;font-weight:600;color:${isOv?'var(--red)':'var(--gray5)'}">${visitStatusText(st)}</div>
      </div>
      ${btn}
    </div>`;
  }).join('');

  return `<div class="bene-card" id="bcard-${ben.id}">
    <div class="bene-header" onclick="toggleCard('${ben.id}')">
      <div class="avatar">${initials(ben.name)}</div>
      <div class="bene-info">
        <div class="bene-name">${ben.name}</div>
        <div class="bene-sub">${ben.village ? ben.village + ' · ' : ''}LMP: ${fmt(sched.lmp)}</div>
        ${pillHtml(nd)}
      </div>
      <span class="chevron" id="chev-${ben.id}">▼</span>
    </div>
    <div class="bene-detail" id="detail-${ben.id}">
      <div class="edd-row">
        <div>
          <div class="label">Expected Delivery Date</div>
          <div class="value">${fmt(sched.edd)}</div>
        </div>
        <div style="text-align:right">
          <div class="label">Status</div>
          <div class="days">${eddStr}</div>
        </div>
      </div>
      <div class="visit-section">
        <div class="visit-heading">ANC Visits</div>
        ${ancRows}
        <div class="visit-heading" style="margin-top:14px">Td Vaccination</div>
        ${tdRows}
      </div>
      <div class="detail-actions">
        <button class="btn-del" onclick="deleteBen('${ben.id}')">🗑 Remove</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const d = document.getElementById('detail-' + id);
  const c = document.getElementById('chev-' + id);
  const open = d.classList.contains('open');
  d.classList.toggle('open', !open);
  c.classList.toggle('open', !open);
}

// ─── FILTER STATE ────────────────────────────────────────────────────────
let currentChip = 'all';
function setChip(chip, el) {
  currentChip = chip;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ─── RENDER FUNCTIONS ────────────────────────────────────────────────────
function filteredBens() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
  return db.beneficiaries.filter(b => {
    if (q && !b.name.toLowerCase().includes(q) && !(b.village||'').toLowerCase().includes(q) && !(b.mobile||'').includes(q)) return false;
    if (currentChip === 'overdue') return isOverdue(b);
    if (currentChip === 'today')   return isDueToday(b);
    if (currentChip === 'week')    return isDueThisWeek(b);
    return true;
  });
}

function renderHome() {
  const total = db.beneficiaries.length;
  const overdue = db.beneficiaries.filter(isOverdue).length;
  const week = db.beneficiaries.filter(isDueThisWeek).length;
  const todays = db.beneficiaries.filter(isDueToday).length;
  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-overdue').textContent = overdue;
  document.getElementById('s-week').textContent    = week;
  document.getElementById('s-today').textContent   = todays;

  // Alerts
  let alertsHtml = '';
  if (overdue > 0) {
    const names = db.beneficiaries.filter(isOverdue).slice(0,2).map(b => b.name).join(', ');
    alertsHtml += `<div class="alert red"><span class="alert-icon">⚠</span><span><strong>${overdue} overdue</strong> – ${names}${overdue > 2 ? ' & more' : ''}</span></div>`;
  }
  if (todays > 0) {
    const names = db.beneficiaries.filter(isDueToday).slice(0,2).map(b => b.name).join(', ');
    alertsHtml += `<div class="alert amber"><span class="alert-icon">🔔</span><span><strong>${todays} due today</strong> – ${names}${todays > 2 ? ' & more' : ''}</span></div>`;
  }
  document.getElementById('home-alerts').innerHTML = alertsHtml;

  // Notification permission prompt
  const nw = document.getElementById('notif-banner-wrap');
  if ('Notification' in window && Notification.permission === 'default') {
    nw.innerHTML = `<div class="notif-banner"><p>Enable notifications to get reminders 7 days, 3 days and on the due date.</p><button class="btn-notif" onclick="requestNotifPermission()">Enable</button></div>`;
  } else {
    nw.innerHTML = '';
  }

  // Recent 3
  const recent = [...db.beneficiaries].reverse().slice(0, 3);
  const recentEl = document.getElementById('home-recent');
  if (!recent.length) {
    recentEl.innerHTML = `<div class="empty"><div class="empty-icon">👩‍⚕️</div><h3>No beneficiaries yet</h3><p>Tap ➕ to register your first beneficiary</p></div>`;
  } else {
    recentEl.innerHTML = recent.map(beneCardHtml).join('');
  }

  // Badge
  const total_alert = overdue + todays;
  const badge = document.getElementById('due-badge');
  if (total_alert > 0) { badge.textContent = total_alert; badge.style.display = 'inline-block'; }
  else { badge.style.display = 'none'; }
}

function renderList() {
  const list = filteredBens();
  const el = document.getElementById('list-container');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No results</h3><p>Try a different search or filter</p></div>`;
    return;
  }
  el.innerHTML = list.map(beneCardHtml).join('');
}

function renderDue() {
  const el = document.getElementById('due-container');
  const overdueBens  = db.beneficiaries.filter(isOverdue);
  const todayBens    = db.beneficiaries.filter(b => !isOverdue(b) && isDueToday(b));
  const weekBens     = db.beneficiaries.filter(b => !isOverdue(b) && !isDueToday(b) && isDueThisWeek(b));

  if (!overdueBens.length && !todayBens.length && !weekBens.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🎉</div><h3>All clear!</h3><p>No overdue or upcoming visits this week.</p></div>`;
    return;
  }

  let html = '';
  if (overdueBens.length) {
    html += `<div class="due-group-title red">⚠ Overdue (${overdueBens.length})</div>`;
    overdueBens.forEach(b => {
      const nd = nextDue(b);
      html += `<div class="due-item red">
        <div class="due-item-left">
          <div class="due-name">${b.name}</div>
          <div class="due-meta">${b.village ? b.village + ' · ' : ''}📱 ${b.mobile || '—'}</div>
        </div>
        <span class="due-service red">${nd.label}</span>
      </div>`;
    });
  }
  if (todayBens.length) {
    html += `<div class="due-group-title amber">🔴 Due Today (${todayBens.length})</div>`;
    todayBens.forEach(b => {
      const nd = nextDue(b);
      html += `<div class="due-item amber">
        <div class="due-item-left">
          <div class="due-name">${b.name}</div>
          <div class="due-meta">${b.village ? b.village + ' · ' : ''}📱 ${b.mobile || '—'}</div>
        </div>
        <span class="due-service amber">${nd.label}</span>
      </div>`;
    });
  }
  if (weekBens.length) {
    html += `<div class="due-group-title blue">📅 Due This Week (${weekBens.length})</div>`;
    weekBens.forEach(b => {
      const nd = nextDue(b);
      html += `<div class="due-item">
        <div class="due-item-left">
          <div class="due-name">${b.name}</div>
          <div class="due-meta">${b.village ? b.village + ' · ' : ''}${nd.days}d away · 📱 ${b.mobile || '—'}</div>
        </div>
        <span class="due-service blue">${nd.label}</span>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function renderAll() {
  renderHome();
  if (document.getElementById('page-list').classList.contains('active')) renderList();
  if (document.getElementById('page-due').classList.contains('active')) renderDue();
  scheduleNotifications();
}

// ─── PAGE NAV ─────────────────────────────────────────────────────────────
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'list') renderList();
  if (name === 'due')  renderDue();
}

function goAddPage() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-add').classList.add('active');
  document.getElementById('f-name').value = '';
  document.getElementById('f-lmp').value = '';
  document.getElementById('f-mobile').value = '';
  document.getElementById('f-village').value = '';
  document.getElementById('preview-box').style.display = 'none';
}

// ─── FORM ─────────────────────────────────────────────────────────────────
function previewCalc() {
  const lmpVal = document.getElementById('f-lmp').value;
  if (!lmpVal) return;
  const s = calcSchedule(lmpVal);
  document.getElementById('pv-edd').textContent  = fmt(s.edd);
  document.getElementById('pv-anc1').textContent = `${fmt(s.anc[0].start)} – ${fmt(s.anc[0].end)}`;
  document.getElementById('pv-td1').textContent  = fmt(s.td[0].due);
  document.getElementById('pv-td2').textContent  = fmt(s.td[1].due);
  document.getElementById('preview-box').style.display = 'block';
}

function submitForm() {
  const name    = document.getElementById('f-name').value.trim();
  const lmp     = document.getElementById('f-lmp').value;
  const mobile  = document.getElementById('f-mobile').value.trim();
  const village = document.getElementById('f-village').value.trim();
  if (!name)  { alert('Please enter beneficiary name.'); return; }
  if (!lmp)   { alert('Please select LMP date.'); return; }

  // Validate LMP is not in future and not more than 280 days ago
  const lmpDate = parseLocal(lmp);
  const edd = addDays(lmpDate, 280);
  if (lmpDate > today)  { alert('LMP date cannot be in the future.'); return; }
  if (edd < today)      { alert('LMP date too far in the past — EDD has already passed.'); return; }

  db.beneficiaries.push({
    id: Date.now().toString(),
    name, lmp, mobile, village,
    completed: {},
    registeredAt: new Date().toISOString()
  });
  save();
  renderAll();
  scheduleNotifications();
  goPage('list', document.querySelectorAll('.nav-item')[1]);
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────
function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    if (p === 'granted') { scheduleNotifications(); renderHome(); }
  });
}

function scheduleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (!navigator.serviceWorker?.controller) return;

  const notifications = [];
  db.beneficiaries.forEach(ben => {
    const s = calcSchedule(ben.lmp);
    const c = ben.completed || {};
    const allServices = [...s.anc.map(v => ({ id: v.id, label: v.label, due: v.end })),
                         ...s.td.map(v => ({ id: v.id, label: v.label, due: v.due }))];

    allServices.forEach(v => {
      if (c[v.id]) return;
      [7, 3, 0].forEach(days => {
        const trigger = new Date(v.due);
        trigger.setDate(trigger.getDate() - days);
        trigger.setHours(9, 0, 0, 0);
        if (trigger > new Date()) {
          notifications.push({
            tag: `${ben.id}-${v.id}-${days}`,
            title: days === 0 ? `${v.label} Due Today` : `${v.label} Due in ${days} Days`,
            body: `${ben.name}${ben.village ? ' · ' + ben.village : ''} — ${v.label}`,
            timestamp: trigger.getTime()
          });
        }
      });
    });
  });

  navigator.serviceWorker.controller.postMessage({ type: 'SCHEDULE_NOTIFICATIONS', notifications });
}

// ─── PWA INSTALL ─────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-bar').style.display = 'flex';
});
document.getElementById('btn-install-do').addEventListener('click', () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-bar').style.display = 'none';
  });
});

// ─── SERVICE WORKER ───────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(e => console.warn('SW failed:', e));
}
